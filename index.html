function calcFare(distKm, durMin, nurse, emt, monitor, oxygen, o2r) {
const over = Math.max(0, distKm - RATES.baseFare / RATES.perKm - (RATES.baseKm - RATES.baseFare/RATES.perKm));
const overKm = Math.max(0, distKm - RATES.baseKm);
const car = RATES.baseFare + Math.ceil(overKm * RATES.perKm);
const hrs = Math.ceil(durMin / 60);
const nFee = nurse ? hrs * RATES.nurse : 0;
const eFee = emt ? hrs * RATES.emt : 0;
const mFee = monitor ? RATES.monitor : 0;
const o2Fee = oxygen ? (o2r===“south”?RATES.o2south:o2r===“central”?RATES.o2central:RATES.o2north) : 0;
const sub = car + nFee + eFee + mFee + o2Fee;
const tax = Math.round(sub * .05);
return { car, nFee, eFee, mFee, o2Fee, sub, tax, total: sub+tax, overKm: overKm.toFixed(1), hrs };
}
